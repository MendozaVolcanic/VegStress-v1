name: VegStress — NDVI Volcanico Chile

on:
  schedule:
    # Cada 5 dias a las 14:00 UTC (despues de sobrevuelo Sentinel-2)
    - cron: '0 14 */5 * *'
  workflow_dispatch:
    inputs:
      volcan:
        description: 'Volcan a analizar (o "todos")'
        required: false
        default: 'todos'
      meses:
        description: 'Meses hacia atras'
        required: false
        default: '6'

jobs:
  ndvi-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NDVI analysis — todos los volcanes
        if: ${{ github.event.inputs.volcan == 'todos' || github.event.inputs.volcan == '' || github.event_name == 'schedule' }}
        env:
          SH_CLIENT_ID: ${{ secrets.SH_CLIENT_ID }}
          SH_CLIENT_SECRET: ${{ secrets.SH_CLIENT_SECRET }}
        run: |
          MESES="${{ github.event.inputs.meses || '6' }}"
          for VOLCAN in "Villarrica" "Copahue" "Llaima" "Calbuco" "Osorno" \
                        "Puyehue - Cordon Caulle" "Chaiten" \
                        "Nevados de Chillan" "Laguna del Maule" "Lascar"; do
            echo "=== Analizando: $VOLCAN ==="
            python ndvi_analyzer.py --volcan "$VOLCAN" --meses "$MESES" --no-images || echo "Error en $VOLCAN, continuando..."
          done

      - name: Run NDVI analysis — volcan especifico
        if: ${{ github.event.inputs.volcan != 'todos' && github.event.inputs.volcan != '' && github.event_name != 'schedule' }}
        env:
          SH_CLIENT_ID: ${{ secrets.SH_CLIENT_ID }}
          SH_CLIENT_SECRET: ${{ secrets.SH_CLIENT_SECRET }}
        run: |
          python ndvi_analyzer.py --volcan "${{ github.event.inputs.volcan }}" \
            --meses "${{ github.event.inputs.meses || '6' }}" --no-images

      - name: Generate dashboard
        run: python dashboard_generator.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos/ docs/index.html || true
          git diff --staged --quiet || git commit -m "NDVI update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || true
