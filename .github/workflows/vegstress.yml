name: VegStress — NDVI Volcánico

on:
  schedule:
    # Cada 5 días a las 14:00 UTC (después de sobrevuelo Sentinel-2)
    - cron: '0 14 */5 * *'
  workflow_dispatch:
    inputs:
      volcan:
        description: 'Volcán a analizar (o "todos")'
        required: false
        default: 'Laguna del Maule'
      meses:
        description: 'Meses hacia atrás'
        required: false
        default: '6'

jobs:
  ndvi-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NDVI analysis
        env:
          SH_CLIENT_ID: ${{ secrets.SH_CLIENT_ID }}
          SH_CLIENT_SECRET: ${{ secrets.SH_CLIENT_SECRET }}
        run: |
          VOLCAN="${{ github.event.inputs.volcan || 'Laguna del Maule' }}"
          MESES="${{ github.event.inputs.meses || '6' }}"
          python ndvi_analyzer.py --volcan "$VOLCAN" --meses "$MESES"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A datos/ || true
          git diff --staged --quiet || git commit -m "NDVI update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || true
